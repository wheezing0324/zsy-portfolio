<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>测试验收与反馈闭环工具 | 郑舒予</title>
    <style>
      :root {
        --bg: #f6f4ee;
        --panel: #ffffff;
        --ink: #202426;
        --muted: #66706e;
        --line: #d9dfdc;
        --accent: #176b5b;
        --warm: #c47a42;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        line-height: 1.6;
      }
      main {
        width: min(100% - 32px, 1120px);
        margin: 0 auto;
        padding: 38px 0 56px;
      }
      a { color: inherit; text-decoration: none; }
      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 32px;
      }
      .back {
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        font-weight: 700;
      }
      .top-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .badge {
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 800;
      }
      h1 {
        max-width: 840px;
        margin: 0 0 14px;
        font-size: clamp(2.2rem, 5vw, 4.6rem);
        line-height: 1.02;
      }
      .lead {
        max-width: 780px;
        margin: 0 0 24px;
        color: var(--muted);
        font-size: 1.12rem;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        margin: 24px 0 18px;
      }
      .card, .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
      }
      .card { padding: 18px; }
      .card span {
        display: block;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .card strong {
        display: block;
        margin-top: 8px;
        color: var(--accent);
        font-size: 2rem;
        line-height: 1;
      }
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
      }
      .panel { padding: 22px; }
      h2 { margin: 0 0 14px; }
      .checklist, .feedback {
        display: grid;
        gap: 10px;
      }
      label, .feedback-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfcfb;
      }
      input { margin-top: 5px; }
      .feedback-item {
        display: block;
      }
      .feedback-item strong {
        display: block;
        margin-bottom: 4px;
      }
      .feedback-item p {
        margin: 0;
        color: var(--muted);
      }
      .status {
        display: inline-block;
        margin-top: 10px;
        padding: 5px 9px;
        border-radius: 999px;
        background: #e2eee9;
        color: #0f4e43;
        font-size: 0.82rem;
        font-weight: 760;
      }
      .api-status {
        display: inline-flex;
        margin: 0 0 10px;
        padding: 8px 11px;
        border: 1px solid rgba(23, 107, 91, 0.22);
        border-radius: 8px;
        background: #edf7f3;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 760;
      }
      .interaction-form {
        display: grid;
        gap: 10px;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
      }
      .interaction-form input,
      .interaction-form select,
      .interaction-form textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }
      .interaction-form input,
      .interaction-form select {
        min-height: 40px;
        padding: 0 12px;
      }
      .interaction-form textarea {
        min-height: 76px;
        padding: 10px 12px;
        resize: vertical;
      }
      button {
        min-height: 40px;
        border: 1px solid var(--accent);
        border-radius: 999px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 760;
        padding: 0 14px;
      }
      @media (max-width: 820px) {
        .summary, .layout { grid-template-columns: 1fr; }
        .topbar { align-items: flex-start; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="top-actions">
          <a class="back" href="../index.html#works">返回主页</a>
          <a class="back" href="../docs/prd-acceptance-tracker.html">查看 PRD</a>
        </div>
        <span class="badge">Vibe Coding Demo / QA</span>
      </div>
      <h1>测试验收与反馈闭环工具</h1>
      <p class="lead">
        这个 Demo 对应岗位里的“测试与验收协助、问题跟踪、收集反馈并推进产品迭代优化”，展示产品经理如何把上线前后问题闭环。
      </p>
      <div class="api-status" id="api-status">正在连接后端 API...</div>

      <section class="summary" aria-label="acceptance summary">
        <div class="card"><span>验收完成</span><strong data-count="done">3/5</strong></div>
        <div class="card"><span>待跟进问题</span><strong data-count="issues">4</strong></div>
        <div class="card"><span>本轮反馈</span><strong data-count="feedback">12</strong></div>
      </section>

      <section class="layout">
        <div class="panel">
          <h2>功能验收清单</h2>
          <div class="checklist"></div>
        </div>
        <div class="panel">
          <h2>反馈与迭代池</h2>
          <div class="feedback"></div>
          <form class="interaction-form" id="feedback-form">
            <h2>新增反馈</h2>
            <input name="title" value="面试官：希望看到风险分级逻辑" aria-label="反馈标题" />
            <textarea name="note" required aria-label="反馈说明">产品判断：补充风险等级、影响范围和下一步处理动作，方便验收会快速决策。</textarea>
            <select name="status" aria-label="反馈状态">
              <option value="P0 / 本轮修复">P0 / 本轮修复</option>
              <option value="P1 / 下一版">P1 / 下一版</option>
              <option value="文档补充">文档补充</option>
            </select>
            <button type="submit">提交到后端反馈池</button>
          </form>
        </div>
      </section>
    </main>
    <script>
      const fallbackAcceptance = {
        summary: { done: 3, total: 5, openIssues: 4, feedback: 12 },
        checks: [
          { id: "filter-sync", text: "客户等级筛选会同步刷新指标、列表和导出字段。", done: true },
          { id: "risk-sort", text: "异常客户列表支持按风险原因排序。", done: true },
          { id: "empty-state", text: "空状态提供解释文案和下一步操作。", done: true },
          { id: "export-retry", text: "导出任务失败时提供重试入口和错误提示。", done: false },
          { id: "release-note", text: "版本发布说明覆盖影响范围、使用方式和回滚方案。", done: false }
        ],
        feedback: [
          { title: "运营：希望导出字段可保存为常用模板", note: "产品判断：高频但非首版阻塞，进入 P1 迭代。", status: "P1 / 下一版" },
          { title: "测试：风险原因枚举与接口返回不一致", note: "产品判断：影响验收口径，需本轮修复并同步字段说明。", status: "P0 / 本轮修复" },
          { title: "客户成功：需要一页使用说明给一线同学", note: "产品判断：补充版本发布文档和培训话术。", status: "文档补充" }
        ]
      };

      let acceptanceState = fallbackAcceptance;
      const apiStatus = document.getElementById("api-status");

      const setApiStatus = (message) => {
        apiStatus.textContent = message;
      };

      const renderAcceptance = (data) => {
        document.querySelector('[data-count="done"]').textContent = `${data.summary.done}/${data.summary.total}`;
        document.querySelector('[data-count="issues"]').textContent = data.summary.openIssues;
        document.querySelector('[data-count="feedback"]').textContent = data.summary.feedback;

        document.querySelector(".checklist").innerHTML = data.checks
          .map(
            (item) =>
              `<label><input type="checkbox" data-check-id="${item.id}" ${item.done ? "checked" : ""} /> ${item.text}</label>`
          )
          .join("");

        document.querySelector(".feedback").innerHTML = data.feedback
          .map(
            (item) =>
              `<div class="feedback-item"><strong>${item.title}</strong><p>${item.note}</p><span class="status">${item.status}</span></div>`
          )
          .join("");

        document.querySelectorAll("[data-check-id]").forEach((input) => {
          input.addEventListener("change", async () => {
            const payload = { id: input.dataset.checkId, done: input.checked };
            try {
              const response = await fetch("/api/acceptance/check", {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
              });
              const updated = await response.json();
              acceptanceState = {
                ...acceptanceState,
                summary: updated.summary,
                checks: updated.checks
              };
              setApiStatus(`PATCH /api/acceptance/check 已写入：${input.checked ? "完成" : "未完成"}`);
              renderAcceptance(acceptanceState);
            } catch {
              const item = acceptanceState.checks.find((entry) => entry.id === payload.id);
              if (item) item.done = payload.done;
              const done = acceptanceState.checks.filter((entry) => entry.done).length;
              acceptanceState.summary.done = done;
              acceptanceState.summary.openIssues =
                acceptanceState.feedback.length + acceptanceState.checks.filter((entry) => !entry.done).length;
              renderAcceptance(acceptanceState);
              setApiStatus("离线静态模式：验收状态只保存在当前页面");
            }
          });
        });
      };

      document.getElementById("feedback-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = Object.fromEntries(new FormData(event.currentTarget).entries());
        setApiStatus("POST /api/acceptance/feedback 提交中...");
        try {
          const response = await fetch("/api/acceptance/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          acceptanceState = await response.json();
          renderAcceptance(acceptanceState);
          setApiStatus(`POST /api/acceptance/feedback 已写入，反馈池共 ${acceptanceState.feedback.length} 条`);
        } catch {
          acceptanceState.feedback.unshift(payload);
          acceptanceState.summary.feedback += 1;
          acceptanceState.summary.openIssues += 1;
          renderAcceptance(acceptanceState);
          setApiStatus("离线静态模式：新增反馈只保存在当前页面");
        }
      });

      fetch("/api/acceptance")
        .then((response) => response.json())
        .then((data) => {
          acceptanceState = data;
          renderAcceptance(acceptanceState);
          setApiStatus("GET /api/acceptance 已从后端加载验收数据");
        })
        .catch(() => {
          renderAcceptance(acceptanceState);
          setApiStatus("未连接后端，当前使用静态 fallback 数据");
        });
    </script>
  </body>
</html>
